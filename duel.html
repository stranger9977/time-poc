<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Commit Window — clean visual</title>
<style>
  :root {
    --page: #0d0d0d; --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
    --muted: #898781; --grid: #2c2c2a; --border: rgba(255,255,255,0.10);
    --blue: #3987e5; --orange: #d95926; --yellow: #c98500; --violet: #9085e9;
    --critical: #d03b3b; --good: #0ca30c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--page); color: var(--ink); font-family: system-ui, -apple-system, "Segoe UI", sans-serif; line-height: 1.5; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 20px 24px 60px; }

  .topbar { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; padding: 10px 0 18px; }
  .topbar .title { font-size: 15px; font-weight: 700; margin-right: auto; }
  .topbar .title span { color: var(--muted); font-weight: 400; }
  button {
    font: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink);
    background: #242423; border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 14px; cursor: pointer;
  }
  button:hover { background: #2e2e2c; }
  button.primary { background: var(--blue); border-color: var(--blue); }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button { border: none; border-radius: 0; }
  .seg button.on { background: var(--blue); }
  .dots { display: inline-flex; gap: 7px; align-items: center; }
  .dots i { width: 8px; height: 8px; border-radius: 50%; background: var(--grid); }
  .dots i.on { background: var(--ink); }
  a { color: var(--blue); font-size: 13.5px; }

  .stage { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  svg { display: block; width: 100%; height: auto; }
  svg text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }

  .caption { max-width: 900px; margin: 22px auto 0; text-align: center; min-height: 132px; }
  .caption h3 { font-size: 24px; font-weight: 750; margin-bottom: 6px; }
  .caption p { font-size: 16.5px; color: var(--ink-2); }
  .hint { text-align: center; color: var(--muted); font-size: 12.5px; margin-top: 18px; }
  body.zen .topbar, body.zen .hint { visibility: hidden; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">The Commit Window <span>· offense vs defense on one clock</span></div>
    <div class="dots" id="dots"></div>
    <button id="prev">← Prev</button>
    <button class="primary" id="next">Next beat →</button>
    <span class="seg">
      <button id="mAvg" class="on">Average player</button>
      <button id="mElite">Elite player</button>
    </span>
    <a href="index.html#act4">← back to the POC</a>
  </div>

  <div class="stage"><svg id="scene" viewBox="0 0 1600 900" role="img"
    aria-label="Diagram of offense and defense timelines: anticipation, commit, possibility, and the defense's shrinking window of certainty"></svg></div>

  <div class="caption"><h3 id="capH"></h3><p id="capP"></p></div>
  <div class="hint">→ / ← step through the beats · M toggles average/elite · H hides the chrome for screen-recording</div>
</div>

<script src="commitwindow.js"></script>
<script>
'use strict';
initCommitWindow({
  svg: document.getElementById('scene'),
  capH: document.getElementById('capH'),
  capP: document.getElementById('capP'),
  dots: document.getElementById('dots'),
  prev: document.getElementById('prev'),
  next: document.getElementById('next'),
  avg: document.getElementById('mAvg'),
  elite: document.getElementById('mElite'),
  keyboard: true,
  deepLink: true,
});
document.addEventListener('keydown', e => {
  if (e.key === 'h' || e.key === 'H') document.body.classList.toggle('zen');
});
</script>
</body>
</html>
